<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vertex Capital Group • Attendance</title>

  <style>
    :root{
      --bg:#050505; --text:#fff; --muted:#9a9a9a;
      --border:rgba(255,255,255,.08); --glass:rgba(255,255,255,.03);
      --ok:#00ffa3; --warn:#ff3b30;
      --r:22px; --r2:16px;
      --shadow: 0 26px 70px rgba(0,0,0,.55);
      --shadow2: 0 14px 30px rgba(0,0,0,.45);
      --font: -apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,Segoe UI,Roboto,Arial,sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; padding:22px 18px 40px;
      display:flex; justify-content:center; font-family:var(--font); color:var(--text);
      background:
        radial-gradient(1000px 600px at 50% -120px, rgba(255,255,255,.06), transparent 60%),
        radial-gradient(900px 500px at 120% 20%, rgba(0,255,163,.05), transparent 50%),
        radial-gradient(900px 500px at -20% 30%, rgba(255,59,48,.05), transparent 55%),
        var(--bg);
    }
    main{width:min(980px,100%)}
    header{
      display:flex; align-items:flex-end; justify-content:space-between; gap:14px;
      padding:12px 6px 18px;
    }
    h1{margin:0;font-size:28px;font-weight:900;letter-spacing:-1px}
    .sub{color:var(--muted);font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:800}
    .brand{display:flex;flex-direction:column;gap:8px}

    .clock-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:6px;min-width:320px}
    .dt{
      display:flex; flex-direction:column; align-items:flex-end; gap:6px;
      padding:10px 12px; border-radius:14px;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border); box-shadow:var(--shadow2);
      width:100%;
    }
    #date{
      font-size:12px;
      font-weight:900;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(255,255,255,.75);
      text-align:right;
    }
    #clock{
      font-family:var(--mono);
      font-size:20px;
      font-weight:900;
      letter-spacing:.05em;
      font-variant-numeric: tabular-nums;
      text-align:right;
      width:100%;
    }
    .cutoff{
      font-size:10px; letter-spacing:.14em; text-transform:uppercase; font-weight:900;
      color:rgba(255,255,255,.6); text-align:right;
    }
    .cutoff b{color:rgba(255,59,48,.9)}
    .panel{
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border-radius:var(--r); box-shadow:var(--shadow); padding:18px;
    }
    .action-bar{
      display:grid; grid-template-columns:1fr auto auto; gap:12px; align-items:center;
    }
    .input-wrap{
      display:flex; gap:10px; align-items:center;
      background:rgba(0,0,0,.55); border:1px solid var(--border);
      border-radius:var(--r2); padding:12px 14px;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:rgba(255,255,255,.12)}
    .input-box{
      width:100%; border:none; outline:none; background:transparent; color:var(--text);
      font-family:var(--mono); font-size:16px; font-weight:900;
      letter-spacing:.35em; text-align:center;
    }
    .input-box::placeholder{color:rgba(255,255,255,.28);letter-spacing:.22em;font-weight:900}
    .input-wrap:focus-within{border-color:rgba(255,255,255,.28);box-shadow:0 0 0 4px rgba(255,255,255,.05)}
    .btn{
      padding:12px 16px; min-height:44px; border-radius:var(--r2);
      border:1px solid transparent; background:var(--glass); color:var(--text);
      font-size:13px; font-weight:900; letter-spacing:.08em; text-transform:uppercase;
      cursor:pointer; user-select:none; transition:.12s ease;
    }
    .btn:disabled{opacity:.18;cursor:not-allowed}
    .btn-in{background:#fff;color:#000;border-color:rgba(255,255,255,.45)}
    .btn-out{background:rgba(255,255,255,.04);border-color:var(--border)}
    #msg{
      margin:14px 2px 0; min-height:18px; text-align:center;
      font-size:13px; font-weight:900; color:rgba(255,255,255,.78)
    }
    .msg-ok{color:var(--ok)!important}
    .msg-warn{color:rgba(255,59,48,.95)!important}

    .board{margin-top:18px}
    .board-header{
      display:grid; grid-template-columns:1.8fr 1fr 1fr; gap:10px;
      padding:12px 10px 10px; color:var(--muted);
      font-size:11px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;
    }
    .member-list{display:flex;flex-direction:column;gap:10px}
    .member-row{
      display:grid; grid-template-columns:1.8fr 1fr 1fr; gap:10px; align-items:center;
      padding:16px 16px; background:rgba(255,255,255,.025);
      border:1px solid var(--border); border-radius:18px;
      backdrop-filter: blur(10px);
    }
    .name-col{display:flex;flex-direction:column;gap:6px;min-width:0}
    .m-name{font-size:16px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .st-pill{
      width:fit-content; font-size:10px; font-weight:1000; letter-spacing:.12em;
      text-transform:uppercase; padding:5px 10px; border-radius:999px; border:1px solid transparent;
    }
    .pill-absent{background:rgba(255,59,48,.10);color:rgba(255,59,48,.95);border-color:rgba(255,59,48,.18)}
    .pill-active{background:rgba(0,255,163,.10);color:rgba(0,255,163,.95);border-color:rgba(0,255,163,.20)}
    .pill-done{background:rgba(255,255,255,.06);color:rgba(255,255,255,.60);border-color:rgba(255,255,255,.10)}
    .time-col{font-family:var(--mono);font-size:13px;font-weight:900;font-variant-numeric:tabular-nums}
    .time-label{
      display:block;font-size:10px;color:var(--muted);font-weight:900;
      letter-spacing:.12em;text-transform:uppercase;margin-bottom:4px;font-family:var(--font)
    }

    @media (max-width:680px){
      header{flex-direction:column;align-items:flex-start}
      .clock-wrap{align-items:flex-start; width:100%}
      .dt{align-items:flex-start}
      #date,#clock,.cutoff{text-align:left}
      .action-bar{grid-template-columns:1fr}
      .board-header,.member-row{grid-template-columns:1.4fr 1fr 1fr}
    }
  </style>
</head>

<body>
<main>
  <header>
    <div class="brand">
      <h1>Vertex Capital Group</h1>
      <div class="sub">Attendance • Asia/Dubai</div>
    </div>

    <div class="clock-wrap">
      <div class="dt">
        <div id="date">—</div>
        <div id="clock">00:00:00</div>
      </div>
      <div class="cutoff">
        Check-in: <b>09:50 → 10:05</b> • Check-out: <b>15:55 → 16:10</b>
      </div>
    </div>
  </header>

  <section class="panel">
    <div class="action-bar">
      <div class="input-wrap">
        <div class="dot" id="statusDot"></div>
        <input id="code" class="input-box" type="password" maxlength="4" inputmode="numeric" autocomplete="off" placeholder="ENTER CODE" />
      </div>
      <button id="in" class="btn btn-in" disabled>Check In</button>
      <button id="out" class="btn btn-out" disabled>Check Out</button>
    </div>

    <div id="msg"></div>

    <div class="board">
      <div class="board-header">
        <div>Personnel</div>
        <div>Arrival</div>
        <div>Departure</div>
      </div>
      <div class="member-list" id="board"></div>
    </div>
  </section>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
  import {
    getFirestore,
    collection, doc, setDoc,
    onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBfFGONDpjauXBHQv_nnwpaXSm9TrqXwr0",
    authDomain: "vertex-607d6.firebaseapp.com",
    projectId: "vertex-607d6",
    storageBucket: "vertex-607d6.firebasestorage.app",
    messagingSenderId: "577879638497",
    appId: "1:577879638497:web:6f51ef567550f5e79bd2a0"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Kiosk: one device can do check in/out for anyone by code
  const TEAM = { "2021":"Aysha", "2022":"Areeba", "2023":"Afra", "2024":"Sekandar", "2025":"Salem" };

  // Windows (Dubai minutes)
  const CHECKIN_OPEN_MIN   = 9 * 60 + 50;  // 09:50
  const CHECKIN_CLOSE_MIN  = 10 * 60 + 5;  // 10:05
  const CHECKOUT_OPEN_MIN  = 15 * 60 + 55; // 15:55
  const CHECKOUT_CLOSE_MIN = 16 * 60 + 10; // 16:10

  const input = document.getElementById("code");
  const inBtn = document.getElementById("in");
  const outBtn = document.getElementById("out");
  const msg = document.getElementById("msg");
  const board = document.getElementById("board");
  const clockEl = document.getElementById("clock");
  const dateEl = document.getElementById("date");
  const statusDot = document.getElementById("statusDot");

  let busy = false;
  let todayMap = {};
  let activeDateId = null;
  let unsub = null;

  function dubaiNow(date = new Date()){
    const pretty = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Dubai",
      weekday: "short", day: "2-digit", month: "short", year: "numeric"
    }).format(date);

    const parts = new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Dubai",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hourCycle: "h23",
      year: "numeric", month: "2-digit", day: "2-digit"
    }).formatToParts(date);

    const get = (t) => parts.find(p => p.type === t)?.value;
    const hh = Number(get("hour")), mm = Number(get("minute"));
    return {
      dateId: `${get("year")}-${get("month")}-${get("day")}`,
      time: `${get("hour")}:${get("minute")}:${get("second")}`,
      minutes: hh * 60 + mm,
      prettyDate: pretty
    };
  }

  function inWindow(openMin, closeMin, nowMin){
    return nowMin >= openMin && nowMin <= closeMin;
  }

  function sanitizeCode(v){ return (v || "").replace(/\D/g,"").slice(0,4); }

  function setMessage(text, kind=""){
    msg.classList.remove("msg-ok","msg-warn");
    if (kind === "ok") msg.classList.add("msg-ok");
    if (kind === "warn") msg.classList.add("msg-warn");
    msg.textContent = text || "";
  }

  function renderBoard(){
    const names = Object.values(TEAM);
    board.innerHTML = names.map(name => {
      const rec = todayMap[name] || {};
      let pill = `<div class="st-pill pill-absent">Missing</div>`;
      if (rec.checkInTime) pill = `<div class="st-pill pill-active">Present</div>`;
      if (rec.checkOutTime) pill = `<div class="st-pill pill-done">Departed</div>`;
      return `
        <div class="member-row">
          <div class="name-col">
            <span class="m-name">${name}</span>
            ${pill}
          </div>
          <div class="time-col"><span class="time-label">In</span>${rec.checkInTime || "—"}</div>
          <div class="time-col"><span class="time-label">Out</span>${rec.checkOutTime || "—"}</div>
        </div>
      `;
    }).join("");
  }

  function listenForToday(){
    const s = dubaiNow();
    if (s.dateId === activeDateId) return;

    activeDateId = s.dateId;
    todayMap = {};
    renderBoard();
    setMessage("", "");

    if (typeof unsub === "function") unsub();

    const col = collection(db, "attendance", activeDateId, "records");
    unsub = onSnapshot(col, (snap) => {
      const map = {};
      snap.forEach(d => map[d.id] = d.data());
      todayMap = map;
      renderBoard();
    }, () => setMessage("Realtime connection issue.", "warn"));
  }

  function syncUI(){
    const s = dubaiNow();
    clockEl.textContent = s.time;
    dateEl.textContent = s.prettyDate;

    const clean = sanitizeCode(input.value);
    if (clean !== input.value) input.value = clean;

    const name = TEAM[clean];

    if (!clean) statusDot.style.background = "rgba(255,255,255,.12)";
    else if (name) statusDot.style.background = "rgba(0,255,163,.8)";
    else statusDot.style.background = "rgba(255,59,48,.85)";

    if (!name || busy){
      inBtn.disabled = true;
      outBtn.disabled = true;
      return;
    }

    const rec = todayMap[name] || {};
    const hasIn = !!rec.checkInTime;
    const hasOut = !!rec.checkOutTime;

    const checkInOpen  = inWindow(CHECKIN_OPEN_MIN, CHECKIN_CLOSE_MIN, s.minutes);
    const checkOutOpen = inWindow(CHECKOUT_OPEN_MIN, CHECKOUT_CLOSE_MIN, s.minutes);

    inBtn.disabled  = !(checkInOpen && !hasIn && !hasOut);
    outBtn.disabled = !(checkOutOpen && hasIn && !hasOut);
  }

  async function log(type){
    const s = dubaiNow();
    const code = sanitizeCode(input.value);
    const name = TEAM[code];
    if (!name) return setMessage("Invalid code.", "warn");

    const rec = todayMap[name] || {};
    const hasIn = !!rec.checkInTime;
    const hasOut = !!rec.checkOutTime;

    const checkInOpen  = inWindow(CHECKIN_OPEN_MIN, CHECKIN_CLOSE_MIN, s.minutes);
    const checkOutOpen = inWindow(CHECKOUT_OPEN_MIN, CHECKOUT_CLOSE_MIN, s.minutes);

    if (type === "IN"){
      if (!checkInOpen) return setMessage("Check-in is closed right now.", "warn");
      if (hasIn) return setMessage("Already checked in today.", "warn");
      if (hasOut) return setMessage("Already checked out today. Check-in not allowed.", "warn");
    } else {
      if (!checkOutOpen) return setMessage("Check-out is closed right now.", "warn");
      if (!hasIn) return setMessage("You must check in first.", "warn");
      if (hasOut) return setMessage("Already checked out today.", "warn");
    }

    try{
      busy = true;
      syncUI();
      setMessage("Saving...", "");

      const ref = doc(db, "attendance", s.dateId, "records", name);

      if (type === "IN"){
        await setDoc(ref, {
          name,
          dateId: s.dateId,
          checkInTime: s.time,
          checkInAt: serverTimestamp()
        }, { merge: true });
      } else {
        await setDoc(ref, {
          name,
          dateId: s.dateId,
          checkOutTime: s.time,
          checkOutAt: serverTimestamp()
        }, { merge: true });
      }

      setMessage(`Confirmed: ${name} (${type})`, "ok");
      input.value = "";
    } catch(e){
      console.error(e);
      setMessage("Error saving. Check Firebase Auth + Rules.", "warn");
    } finally{
      busy = false;
      syncUI();
    }
  }

  inBtn.addEventListener("click", () => log("IN"));
  outBtn.addEventListener("click", () => log("OUT"));
  input.addEventListener("input", syncUI);

  // Start
  renderBoard();
  setInterval(() => { listenForToday(); syncUI(); }, 500);

  try{
    await signInAnonymously(auth);
    setMessage("Connected.", "ok");
    listenForToday();
  } catch(e){
    console.error(e);
    setMessage("Enable Anonymous Auth in Firebase Console.", "warn");
  }
</script>
</body>
</html>
